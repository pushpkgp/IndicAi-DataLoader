apiVersion: v1
kind: Service
metadata:
  name: {{ include "indic-ai-data-loader.fullname" . }}
spec:
  selector:
    app: {{ include "indic-ai-data-loader.name" . }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
  type: {{ .Values.service.type }}